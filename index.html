<!DOCTYPE html>
<html lang="ru" style="height: 100%;">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="ad.size" content="width=960,height=640">
	<title>960x640</title>

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap" rel="stylesheet">

	<style>
		* {
			box-sizing: border-box;
		}
		.mainContainer {
			--wInner: 806px;
			--grLinear:  linear-gradient(180deg,rgba(229, 229, 229, 1) 30%, rgba(248, 248, 248, 1) 100%);
			width: 960px;
			height: 640px;
			position: relative;
			overflow: hidden;
			background: #E5E5E5;
			background: var(--grLinear);
			border: 1px solid #cecece;
			display: flex;			
			flex-direction: column;
			font-family: "Nunito Sans", sans-serif;
			font-optical-sizing: auto;
			color: #000 !important;
			text-decoration: none;
		}
		
		.mainContainer-video,
		.mainContainer-page-inner {
			width: var(--wInner);
		}


		.mainContainer-footer-header {
			display: flex;
			align-items: flex-end;
			justify-content: center;
			min-height: 80px;
			padding-bottom: 5px;
		}


		.mainContainer-footer {
			font-weight: 500;
			font-size: 13px;
			display: flex;
			flex-wrap: wrap;
			padding-inline: 5px;
		}
		.mainContainer-footer-r,
		.mainContainer-footer-l {
			color: #153F6A !important;
			flex-grow: 1;
			line-height: 1;
			margin-bottom: 4px;
		}
		.mainContainer-footer-r {
			text-align: right;
		}
		.mainContainer-footer-ligal {
			min-width: 100%;
			text-align: center;
		}


		.mainContainer-body {
			flex-grow: 1;
			display: flex;
			align-items: center;
			justify-content: center;
			position: relative;
		}
		.mainContainer-title {
			width: 654px;
			aspect-ratio: 109 / 6;
			background-image: url("img/title.svg");
			background-repeat: no-repeat;
			background-position: center;
			background-size: cover;
		}
		

		/* video */
		.mainContainer-video,
		.mainContainer-video img,
		.mainContainer-video video {
			border-radius: 45px;
			max-width: 100%;
			aspect-ratio: 161 / 90;
		}
		.mainContainer-video {
			background-image: url(img/screen.jpg);
			background-repeat: no-repeat;
			background-size: 95% 97%;
			background-position: center;
			display: flex;
			position: relative;
		}
		.mute {
			position: absolute;
			z-index: 1;
			top: 25px;
			right: 25px;
			display: flex;
			align-items: center;
			justify-content: center;
			width: 50px;
			aspect-ratio: 1;
			cursor: pointer;
			border: 0;
			border-radius: 50%;
			background-color: #fff;
			background-repeat: no-repeat;
			background-position: center;
			background-size: 30px auto;
		}
		.mute-off {
			background-image: url(img/mute-on.svg);
		}
		.mute-on {
			background-image: url(img/mute-off.svg);
		}
		/* /video */

		.mainContainer-gems {
			right: 0;
			bottom: 0;
			left: 0;
			top: 0;
			position: absolute;
			z-index: 0;
		}
		.mainContainer-gems-layer_1,
		.mainContainer-gems-layer_2 {
			position: absolute;
			right: 0;
			bottom: 0;
			left: 0;
			top: 0;
			z-index: 0;
		}
		.mainContainer:not(.mainContainer-hovered) .mainContainer-gems .mainContainer-gems-layer_1,
		.mainContainer:not(.mainContainer-hovered) .mainContainer-gems .mainContainer-gems-layer_2,
		.mainContainer-gems.hovered .mainContainer-gems-layer_1,
		.mainContainer-gems.hovered .mainContainer-gems-layer_2 {
			transition: transform 0.5s ease-out !important;
		}
		.mainContainer-gems:hover .mainContainer-gems-layer_1,
		.mainContainer-gems:hover .mainContainer-gems-layer_2 {
			transition: transform 0s ease-out;
		}
		.mainContainer-gems-layer_1 {
			z-index: 1;
		}
		.mainContainer-gems img {
			position: absolute;
			z-index: 0;
		}
		.mainContainer-gems-layer_2 img {
			width: 100%;
		}

		/* камни */
		.mainContainer-gems-gem_1 {
			top: -70px;
			left: -90px;
		}
		.mainContainer-gems-gem_2 {
			right: -100px;
			top: -25px;
		}
		.mainContainer-gems-gem_3 {
			left: -170px;
			top: 43%;
		}
		.mainContainer-gems-layer_2 {
			left: -25px;
			top: -13px;
		}
		/* /камни */

		/* коробка */
		.mainContainer:not(.mainContainer-hovered) .mainContainer-box .mainContainer-box-img {
			transform-origin:  center; 
			animation: elastic-bounce 4s ease-in-out infinite;
		}

		.mainContainer-box-trigger,
		.mainContainer-box {
			position: absolute;
			aspect-ratio: 41 / 51;
			height: 153px;
			z-index: 1;
			right: 80px;
			bottom: 19px;
		}
		.mainContainer-box-trigger {
			height: 250px;
			right: 60px;
			width: 160px;
			aspect-ratio: auto;
			z-index: 2;
		}
		.mainContainer-box-btn {
			cursor: pointer;
			width: 195px;
			height: 46px;
			display: flex;
			align-items: center;
			justify-content: center;
			color: #fff;
			text-transform: uppercase;
			appearance: none;
			background-color: transparent;
			margin-left:10px;
			padding: 0;
			border: 0;
			scale: .9;
			opacity: 0;
			position: absolute;
			right: 0;
			left: auto;
			bottom: 0;
			translate: -47px -14px;
		}
		.mainContainer-box-btn img {
			width: 100%;
			height: 100%;
		}
		.mainContainer-box-img {
			max-width: 100%;
			translate: -14px 0;
		}
		.mainContainer-box::after {
			animation-delay: .25s !important;
			color: rgba(231, 47, 31, 0.7);
		}
		.mainContainer-box::before {
			animation-delay: -0.1s;
			color: rgba(231, 47, 31, 0.7);
		}
		
		.mainContainer-box::after,
		.mainContainer-box::before {
			content: "";
			position: absolute;
			width: 105px;
			aspect-ratio: 1;
			border-radius: 50%;
			background-color: transparent;
			inset: 0;
			margin: auto;
			bottom: -30px;
			z-index: -1;
			animation: pulse 3.2s infinite ease-in-out;			
		}
		
		.mainContainer-box-spot {
			position: absolute;
			width: 105px;
			aspect-ratio: 1;
			border-radius: 50%;
			inset: 0;
			margin: auto;
			bottom: -30px;
			z-index: -1;
			background-color: #fff;
		}
		/* /коробка */

		@keyframes elastic-bounce {
			0% { transform: translateX(-100%); opacity: 0; }
			6% { transform: translateX(20px); opacity: 1; } 
			12% { transform: translateX(-10px); }          
			15% { transform: translateX(0); }              
			100% { transform: translateX(0); }              
		}
		
		@keyframes pulse {
			0% {box-shadow: 0 0 0px 0px; opacity: .83}
			15% {opacity: .5}
			60% {box-shadow: 0 0 0px 30px; opacity: 0}
			100% {box-shadow: 0 0 0px 0px; opacity: 0}
		}


		/* video size 806 x 450 */
		.mainContainer.mainContainer-hovered
			.mainContainer-video {
				width: 63%;
				translate: -101px 56px;
			}
		.mainContainer.mainContainer-hovered
			.mainContainer-gems {
				--s: -75px;
				right: var(--s);
				bottom:  var(--s);
				left:  var(--s);
				top:  var(--s);
			}
		.mainContainer.mainContainer-hovered
			.mainContainer-title {
				translate: -5px 60px;
				width: 75%;
			}
		.mainContainer.mainContainer-hovered
			.mainContainer-box-spot {
				width: 0;
			}
		.mainContainer.mainContainer-hovered 
			.mainContainer-box {
				height: 270px;
				translate: 35px 0;
			}
		.mainContainer.mainContainer-hovered 
			.mainContainer-box-img {
				translate: -17px -35px;
			}
		.mainContainer.mainContainer-hovered {
			.mainContainer-box-btn {
				z-index: 1;
				scale: 1;
				opacity: 1;
				transition: opacity .5s .4s, scale .5s .4s;
				transition-timing-function: linear;
				
			}
		}
		.mainContainer.mainContainer-hovered .mainContainer-box::after,
		.mainContainer.mainContainer-hovered .mainContainer-box::before {
			opacity: 0 !important;
		}
		

		/* animations */
		.mainContainer-video {
			transition: translate .3s linear, width .3s linear;
		}
		.mainContainer-gems {
			--t: .5s;
			transition: top var(--t), bottom var(--t), left var(--t), right var(--t);
		}
		.mainContainer-title {
			transition: translate .5s, width .5s;
		}
		.mainContainer-box-spot {
			transition: width .5s;
		}
		.mainContainer-box {
			transition: height .5s, translate .5s;
		}
		.mainContainer-box img {
			transition: translate .5s;
		}
		.mainContainer-box-btn {
			transition-delay: 0s;
		}

		@media (hover: none) {
			.mainContainer-box-trigger {
				display: none;
			}
		}

	</style>
</head>
<body style="display:flex; justify-content: center; align-items: center; min-height: 100%; margin: 0;">
	<a href="" class="mainContainer mainContainer-parallax">

		<div class="mainContainer-footer-header">
			<div class="mainContainer-title"></div>
		</div>

		<div class="mainContainer-body">
			<div class="mainContainer-video">
				<button class="mute mute-off" onclick="toggleMute(this)" id="muteButton" aria-pressed="false" aria-label="Включить звук"></button>
				<video autoplay muted loop playsinline>
					<source src="img/oktilia_15s.mp4" type="video/mp4">
				</video>
			</div>			
			<div class="mainContainer-box-trigger"></div>
			<div class="mainContainer-box">
				<img src="img/box_big.png" alt="" class="mainContainer-box-img" />
				<div class="mainContainer-box-spot"></div>
			</div>
			<button class="mainContainer-box-btn"><img src="img/button.png" alt=""></button>
		</div>

		<div class="mainContainer-footer">
			<div class="mainContainer-footer-l">
				РЕКЛАМА. Капли глазные. 8 мл. <br />
				РУ П N014751/01 от 13.10.2008. Рекламодатель ООО «Бауш Хелс». 
			</div>
			<div class="mainContainer-footer-r">
				Россия, 115162, Москва, ул. Павловская дом 7 стр.1, тел.: +7 495 510 28 79. <br />
				Bausch.ru RUS-OPH-OKT-OKT-12-2025-5452
			</div>
			<div class="mainContainer-footer-ligal">
				<img src="img/ligal.svg" alt="" />
			</div>
		</div>

		<div class="mainContainer-gems">
			<div class="mainContainer-gems-layer_1">
				<img src="img/gem-layer1-a.webp" alt="" class="mainContainer-gems-gem mainContainer-gems-gem_1" />
				<img src="img/gem-layer1-b.webp" alt="" class="mainContainer-gems-gem mainContainer-gems-gem_2" />
				<img src="img/gem-layer1-c.webp" alt="" class="mainContainer-gems-gem mainContainer-gems-gem_3" />
			</div>
			<div class="mainContainer-gems-layer_2">
				<img src="img/gem-layer2.webp" alt="">
			</div>
		</div>
		
	</a>
</body>
	<script src="gsap.min.js"></script>
	<script src="ScrollTrigger.min.js"></script>
	<script src="index.js"></script>
</html>
